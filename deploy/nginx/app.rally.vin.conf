# app.rally.vin → rally-staff (port 3001)
# Managed by Plesk — this is a reference template

server {
    listen 80;
    listen [::]:80;
    server_name app.rally.vin;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.rally.vin;

    # SSL managed by Plesk (Let's Encrypt)
    # ssl_certificate /etc/letsencrypt/live/app.rally.vin/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.rally.vin/privkey.pem;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static asset caching (Next.js _next/static)
    location /_next/static {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }
}
